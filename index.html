<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Transperth Fake Bus Tracker</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet map CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
</head>

<body>
  <main>
    <div id="map"></div>

    <aside id="selectionPanel" class="selection-panel is-hidden" aria-live="polite">
      <button id="closeSelectionPanelButton" class="panel-close-button" type="button" aria-label="Clear selection">
        ×
      </button>

      <div id="selectionPanelContent" class="selection-panel-content">
        <div class="panel-empty">
          Select a stop or bus to see details.
        </div>
      </div>
    </aside>
  </main>

  <!-- Leaflet map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="app.js"></script>
</body>
</html>
