<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Trip Tracker</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet map CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />

  <!-- MapLibre GL CSS for the optional 3D preview easter egg -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css"
  />
</head>

<body>
  <main>
    <div id="map"></div>

    <button id="locateUserButton" class="map-round-button locate-button" type="button" aria-label="Use my location to find the nearest stop"><img src="gps_icon.svg" alt="" aria-hidden="true" /></button>

    <button id="themeToggleButton" class="map-round-button theme-toggle-button" type="button" aria-label="Enable dark map"><img id="themeToggleIcon" src="enable_dark_mode.svg" alt="" aria-hidden="true" /></button>

    <button id="threeDPreviewButton" class="map-round-button three-d-preview-button" type="button" aria-label="Open 3D preview" title="3D preview">
      <span aria-hidden="true">🏙️</span>
    </button>

    <div class="tracking-mode-control" aria-label="Tracking display mode">
      <div class="tracking-segmented-control" role="group" aria-label="Choose tracking mode">
        <button class="tracking-mode-button" type="button" data-tracking-mode="live">Live</button>
        <button class="tracking-mode-button is-active" type="button" data-tracking-mode="scheduled">Scheduled</button>
        <button class="tracking-mode-button" type="button" data-tracking-mode="ghost">Compare</button>
      </div>
    </div>

    <section id="journeyOverlay" class="journey-overlay" aria-live="polite">
      <label class="journey-field journey-field-start" aria-label="Start location">
        <span class="journey-field-dot journey-field-dot-start"></span>
        <span class="journey-field-text">
          <span class="journey-field-label">From</span>
          <div class="journey-start-input-row">
            <button id="journeyUseLocationInline" class="journey-use-location-inline" type="button">Use your location</button>
            <input id="journeyStartInput" class="journey-field-input" type="text" inputmode="search" autocomplete="off" placeholder="or enter start" />
          </div>
          <span id="journeyStartValue" class="journey-field-value is-hidden-text">Use your location</span>
          <div id="journeyStartSuggestions" class="journey-place-suggestions is-hidden" role="listbox" aria-label="Start location suggestions"></div>
        </span>
      </label>
      <label class="journey-field journey-field-end" aria-label="Destination">
        <span class="journey-field-dot journey-field-dot-end"></span>
        <span class="journey-field-text">
          <span class="journey-field-label">To</span>
          <input id="journeyEndInput" class="journey-field-input" type="text" inputmode="search" autocomplete="off" placeholder="Where to? e.g. Optus Stadium" />
          <span id="journeyEndValue" class="journey-field-value is-hidden-text">Destination</span>
          <div id="journeyEndSuggestions" class="journey-place-suggestions is-hidden" role="listbox" aria-label="Destination suggestions"></div>
        </span>
      </label>
      <button id="journeySearchButton" class="journey-overlay-show" type="button" aria-label="Show journey options">Show me</button>
    </section>

    <div id="stopMapAction" class="stop-map-action is-hidden" aria-live="polite"></div>

    <aside id="selectionPanel" class="selection-panel" aria-live="polite">
      <button id="closeSelectionPanelButton" class="panel-close-button" type="button" aria-label="Clear selection">
        ×
      </button>

      <div id="selectionPanelContent" class="selection-panel-content">
        <div class="panel-empty">
          <div class="panel-empty-title">Tap a stop or bus</div>
          <div class="panel-empty-subtitle">Details will appear here without shifting the map.</div>
        </div>
      </div>
    </aside>

    <div id="threeDPreviewOverlay" class="three-d-preview-overlay is-hidden" aria-hidden="true">
      <button id="closeThreeDPreviewButton" class="three-d-close-button" type="button" aria-label="Close 3D preview">×</button>
      <div id="threeDPreviewMap" class="three-d-preview-map"></div>
      <div id="threeDPreviewHint" class="three-d-preview-hint">3D preview</div>
    </div>

    <div id="liveNoticeModal" class="app-modal is-hidden" role="dialog" aria-modal="true" aria-labelledby="liveNoticeTitle" aria-describedby="liveNoticeDescription">
      <div class="app-modal-card">
        <h2 id="liveNoticeTitle">Noteworthy Comment</h2>
        <p id="liveNoticeDescription">No live data sync currently enabled. This feature is visualisation only, non functional.</p>
        <button id="liveNoticeOkButton" class="app-modal-button" type="button">Ok</button>
      </div>
    </div>
  </main>

  <!-- Leaflet map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <!-- MapLibre GL JS for the optional 3D preview easter egg -->
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>

  <script src="app.js"></script>
</body>
</html>
