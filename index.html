<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Trip Tracker</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Leaflet map CSS -->
  <link
    rel="stylesheet"
    href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  />
</head>

<body>
  <main>
    <div id="map"></div>

    <button id="locateUserButton" class="map-round-button locate-button" type="button" aria-label="Use my location to find the nearest stop"><img src="gps_icon.svg" alt="" aria-hidden="true" /></button>

    <button id="themeToggleButton" class="map-round-button theme-toggle-button" type="button" aria-label="Enable dark map"><img id="themeToggleIcon" src="enable_dark_mode.svg" alt="" aria-hidden="true" /></button>

    <div class="beta-mode-control" aria-label="Tracking display mode">
      <div class="beta-segmented-control" role="group" aria-label="Choose tracking mode">
        <button class="beta-mode-button is-active" type="button" data-beta-mode="live">Live</button>
        <button class="beta-mode-button" type="button" data-beta-mode="scheduled">Scheduled</button>
        <button class="beta-mode-button" type="button" data-beta-mode="ghost">Compare</button>
      </div>
    </div>

    <aside id="selectionPanel" class="selection-panel" aria-live="polite">
      <button id="closeSelectionPanelButton" class="panel-close-button" type="button" aria-label="Clear selection">
        ×
      </button>

      <div id="selectionPanelContent" class="selection-panel-content">
        <div class="panel-empty">
          <div class="panel-empty-title">Tap a stop or bus</div>
          <div class="panel-empty-subtitle">Details will appear here without shifting the map.</div>
        </div>
      </div>
    </aside>
  </main>

  <!-- Leaflet map JS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script src="app.js"></script>
</body>
</html>
